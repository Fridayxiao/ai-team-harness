# OpenAI Codex agent interface metadata.
# This file is consumed by Codex for agent discovery and display.
# The .codex-plugin/plugin.json provides similar metadata for the Codex plugin system.
# Other runtimes (Gemini, Claude) use different discovery mechanisms.
interface:
  display_name: "Delivery Loop"
  short_description: "Run complex goals through acceptance, tests, review, and handoff"
  default_prompt: "Use $delivery-loop to align this goal, define acceptance and verification/tests, execute in reviewable slices, verify, review, and report the user acceptance path."
